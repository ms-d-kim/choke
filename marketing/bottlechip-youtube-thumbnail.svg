<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Bottlechip YouTube demo thumbnail</title>
  <desc id="desc">Cyan-on-black Bottlechip thumbnail showing an AI supply-chain chokepoint graph across HBM, CoWoS, and power.</desc>

  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#1a1a1d" stroke-width="1"/>
    </pattern>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".55"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity=".55"/>
    </filter>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101013"/>
      <stop offset="100%" stop-color="#070708"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="#050506"/>
  <rect width="1280" height="720" fill="url(#grid)" opacity=".9"/>
  <rect x="0" y="0" width="1280" height="720" fill="#22d3ee" opacity=".025"/>
  <circle cx="896" cy="310" r="390" fill="url(#cyanGlow)"/>
  <circle cx="1120" cy="610" r="270" fill="#ff4338" opacity=".07"/>

  <g transform="translate(58 56)">
    <rect x="0" y="0" width="294" height="58" rx="4" fill="#22d3ee" filter="url(#softGlow)"/>
    <text x="22" y="39" fill="#050506" font-family="IBM Plex Mono, Menlo, Monaco, Consolas, monospace" font-size="30" font-weight="800" letter-spacing="2">BOTTLECHIP</text>
  </g>

  <g transform="translate(62 164)">
    <text x="0" y="0" fill="#f3f1ec" font-family="IBM Plex Mono, Menlo, Monaco, Consolas, monospace" font-size="86" font-weight="900" letter-spacing="0">AI SUPPLY</text>
    <text x="0" y="92" fill="#f3f1ec" font-family="IBM Plex Mono, Menlo, Monaco, Consolas, monospace" font-size="86" font-weight="900" letter-spacing="0">CHAIN MAP</text>
    <rect x="4" y="126" width="562" height="6" fill="#22d3ee"/>
    <text x="0" y="182" fill="#a5f3fc" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="34" font-weight="700">HBM · CoWoS · Power</text>
    <text x="0" y="226" fill="#a2a3ad" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="25" font-weight="600">Directional simulator for physical AI bottlenecks</text>
  </g>

  <g transform="translate(56 590)">
    <rect x="0" y="0" width="286" height="48" rx="4" fill="#17171a" stroke="#232327"/>
    <circle cx="28" cy="24" r="7" fill="#25d366"/>
    <text x="48" y="31" fill="#e8e6e1" font-family="IBM Plex Mono, Menlo, Monaco, Consolas, monospace" font-size="18" font-weight="700">DEMO WALKTHROUGH</text>
  </g>

  <g transform="translate(674 88)" filter="url(#hardShadow)">
    <rect x="0" y="0" width="540" height="520" rx="10" fill="url(#panel)" stroke="#2d2d34" stroke-width="2"/>
    <rect x="22" y="22" width="496" height="54" rx="4" fill="#0c0c0e" stroke="#232327"/>
    <text x="44" y="57" fill="#22d3ee" font-family="IBM Plex Mono, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="800">VALUE-CHAIN GRAPH</text>
    <text x="346" y="57" fill="#25d366" font-family="IBM Plex Mono, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="700">LIVE</text>

    <g stroke-linecap="round" stroke-width="4" opacity=".92">
      <line x1="142" y1="250" x2="262" y2="186" stroke="#4b5563"/>
      <line x1="262" y1="186" x2="378" y2="260" stroke="#4b5563"/>
      <line x1="378" y1="260" x2="282" y2="356" stroke="#4b5563"/>
      <line x1="142" y1="250" x2="282" y2="356" stroke="#4b5563"/>
      <line x1="262" y1="186" x2="282" y2="356" stroke="#22d3ee" opacity=".75"/>
      <line x1="378" y1="260" x2="462" y2="156" stroke="#4b5563"/>
      <line x1="142" y1="250" x2="64" y2="156" stroke="#4b5563"/>
      <line x1="282" y1="356" x2="422" y2="416" stroke="#4b5563"/>
      <line x1="282" y1="356" x2="118" y2="420" stroke="#4b5563"/>
    </g>

    <g font-family="IBM Plex Mono, Menlo, Monaco, Consolas, monospace" font-weight="900" text-anchor="middle">
      <circle cx="142" cy="250" r="49" fill="#220b09" stroke="#ff4338" stroke-width="5"/>
      <text x="142" y="257" fill="#f3f1ec" font-size="23">HBM</text>
      <text x="142" y="194" fill="#ff4338" font-size="22">▲</text>

      <circle cx="262" cy="186" r="54" fill="#220b09" stroke="#ff4338" stroke-width="5"/>
      <text x="262" y="193" fill="#f3f1ec" font-size="22">CoWoS</text>
      <text x="262" y="121" fill="#ff4338" font-size="22">▲</text>

      <circle cx="378" cy="260" r="46" fill="#1c1b10" stroke="#ffcf4a" stroke-width="5"/>
      <text x="378" y="267" fill="#f3f1ec" font-size="21">POWER</text>

      <circle cx="282" cy="356" r="42" fill="#082b16" stroke="#25d366" stroke-width="5"/>
      <text x="282" y="363" fill="#f3f1ec" font-size="20">AI</text>
    </g>

    <g font-family="IBM Plex Mono, Menlo, Monaco, Consolas, monospace" font-weight="800" font-size="17" text-anchor="middle">
      <circle cx="64" cy="156" r="31" fill="#101013" stroke="#22d3ee" stroke-width="3"/>
      <text x="64" y="162" fill="#e8e6e1">MU</text>
      <circle cx="462" cy="156" r="31" fill="#101013" stroke="#22d3ee" stroke-width="3"/>
      <text x="462" y="162" fill="#e8e6e1">NVDA</text>
      <circle cx="422" cy="416" r="31" fill="#101013" stroke="#22d3ee" stroke-width="3"/>
      <text x="422" y="422" fill="#e8e6e1">VRT</text>
      <circle cx="118" cy="420" r="31" fill="#101013" stroke="#22d3ee" stroke-width="3"/>
      <text x="118" y="426" fill="#e8e6e1">TSM</text>
    </g>

    <g transform="translate(26 454)">
      <rect x="0" y="0" width="488" height="42" rx="4" fill="#050506" stroke="#232327"/>
      <text x="18" y="27" fill="#a2a3ad" font-family="IBM Plex Mono, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="700">SCENARIO → RE-SHADE → CITED EVIDENCE</text>
    </g>
  </g>
</svg>
